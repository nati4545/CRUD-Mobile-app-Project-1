# This file configures the analyzer, which statically analyzes Dart code to check for
# errors, warnings, and lints.

# The issues identified by the analyzer are surfaced in the UI of Dart-enabled IDEs
# (see https://dart.dev/tools#ides-and-editors). The analyzer can also be invoked from
# the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

linter:
  # The lint rules applied to this project can be customized in the section below to
  # disable rules from the `package:flutter_lints/flutter.yaml` included above or to
  # enable additional rules. A list of all available lints and their documentation is
  # published at https://dart.dev/lints.
  #
  # Instead of disabling a lint rule for the entire project in the section below, it is
  # preferred to disable the lint rule in the file or line that produces the lint.
  rules:
    - camel_case_types
    - camel_case_extensions
    - library_names
    - library_prefixes
    - constant_identifier_names
    - directives_ordering
    - lines_longer_than_80_chars

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
