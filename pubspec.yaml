name: supplier_directory
description: A professional supplier management application built with Flutter using clean architecture.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Bloc State Management
  bloc: ^8.1.3
  flutter_bloc: ^8.1.3

  # Networking
  dio: ^5.3.1

  # Data Models & Functional Programming
  equatable: ^2.0.5
  dartz: ^0.10.1

  # Local Storage
  shared_preferences: ^2.2.2

  # UI & Icons
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  intl: ^0.19.0

  # Utilities
  logger: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
